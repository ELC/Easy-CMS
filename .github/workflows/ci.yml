name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      # jdx/mise-action@v3
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
      - name: Install dependencies
        run: mise run setup:test
      - name: Check
        run: mise run check:ci
      - name: Build
        run: mise run build
