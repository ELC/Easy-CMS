name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v3
      - name: Install dependencies
        run: mise run setup:test
      - name: Check
        run: mise run check:ci
      - name: Build
        run: mise run build
